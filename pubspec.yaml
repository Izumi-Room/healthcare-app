name: flutter_application_2
description: "VitaTree - Living health monitoring app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  go_router: ^14.2.7
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  lottie: ^3.3.3
  firebase_core: ^3.1.1
  firebase_database: ^11.0.1
  firebase_auth: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/trees/
    - assets/lottie/
    - assets/mascot/
